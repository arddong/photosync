services:
  - type: web
    name: photosync
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    plan: free
    envVars:
      - key: EMAIL
        sync: false
      - key: APP_PASSWORD
        sync: false
      - key: ANDROID_ID
        sync: false
